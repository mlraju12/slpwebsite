<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="tidesync-error-hero-title">
  <title id="tidesync-error-hero-title">Split view: missing punch alert and resolved status</title>
  <defs>
    <linearGradient id="errBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="640" fill="url(#errBg)"/>
  <line x1="600" y1="80" x2="600" y2="560" stroke="#334155" stroke-width="2" stroke-dasharray="8 6" opacity="0.7"/>

  <!-- Left panel: Missing punch -->
  <g transform="translate(80, 100)">
    <rect width="480" height="440" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.2))"/>
    <rect width="480" height="52" rx="20" fill="#fef2f2"/>
    <rect y="32" width="480" height="20" fill="#fef2f2"/>
    <text x="24" y="34" fill="#991b1b" font-family="system-ui,sans-serif" font-size="13" font-weight="700">ALERT</text>
    <g transform="translate(400, 10)" opacity="0.95">
      <rect x="0" y="0" width="36" height="28" rx="5" fill="none" stroke="#64748b" stroke-width="2"/>
      <circle cx="18" cy="14" r="5" fill="#2dd4bf"/>
    </g>
    <text x="240" y="220" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Missing Punch</text>
    <text x="240" y="252" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">No out-punch detected for shift end</text>
    <rect x="80" y="290" width="320" height="88" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="240" y="322" text-anchor="middle" fill="#9a3412" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Gap identified - Feb 12, 2:00 PM</text>
    <text x="240" y="348" text-anchor="middle" fill="#c2410c" font-family="system-ui,sans-serif" font-size="12">Review before payroll close</text>
    <circle cx="240" cy="168" r="36" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
    <rect x="234" y="148" width="12" height="28" rx="2" fill="#dc2626"/>
    <circle cx="240" cy="188" r="5" fill="#dc2626"/>
  </g>

  <!-- Right panel: Resolved -->
  <g transform="translate(640, 100)">
    <rect width="480" height="440" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.2))"/>
    <rect width="480" height="52" rx="20" fill="#ecfdf5"/>
    <rect y="32" width="480" height="20" fill="#ecfdf5"/>
    <text x="24" y="34" fill="#047857" font-family="system-ui,sans-serif" font-size="13" font-weight="700">STATUS</text>
    <g transform="translate(332, 10)" opacity="0.95">
      <circle cx="20" cy="14" r="8" fill="#c2410c"/>
      <text x="34" y="18" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Oracle OTL</text>
    </g>
    <text x="240" y="220" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Resolved</text>
    <text x="240" y="252" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Punch corrected - synced to OTL</text>
    <rect x="80" y="290" width="320" height="88" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="240" y="322" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Audit trail complete</text>
    <text x="240" y="348" text-anchor="middle" fill="#15803d" font-family="system-ui,sans-serif" font-size="12">Ready for payroll processing</text>
    <circle cx="240" cy="168" r="40" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
    <path d="M220 168 L234 182 L262 150" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="600" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12" letter-spacing="0.2em">BEFORE - AFTER</text>
</svg>
