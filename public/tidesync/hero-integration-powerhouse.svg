<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="tidesync-hero-title">
  <title id="tidesync-hero-title">Time collection data flowing into Oracle Time and Labor</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200M0 560h1200"/>
    <path d="M100 0v640M200 0v640M300 0v640M400 0v640M500 0v640M600 0v640M700 0v640M800 0v640M900 0v640M1000 0v640M1100 0v640"/>
  </g>

  <!-- Left: badge / biometric reader -->
  <g transform="translate(120, 180)">
    <rect x="0" y="0" width="200" height="280" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="24" y="32" width="152" height="180" rx="8" fill="#0f172a" stroke="#334155"/>
    <!-- fingerprint pattern -->
    <g fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" opacity="0.85">
      <path d="M100 70c-20 0-36 16-36 36"/>
      <path d="M100 88c-12 0-22 10-22 22"/>
      <path d="M100 106c-8 0-14 6-14 14"/>
      <path d="M82 130c0 24 8 40 18 52"/>
      <path d="M118 130c0 24-8 40-18 52"/>
      <circle cx="100" cy="118" r="6" fill="#2dd4bf" stroke="none"/>
    </g>
    <rect x="56" y="228" width="88" height="12" rx="4" fill="#334155"/>
    <text x="100" y="268" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">TIME DEVICE</text>
  </g>

  <!-- Flow: arrows + data nodes -->
  <g filter="url(#glow)">
    <path d="M340 320 L520 320" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="510,310 540,320 510,330" fill="#38bdf8"/>
    <circle cx="400" cy="320" r="6" fill="#2dd4bf">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="320" r="5" fill="#7dd3fc">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="430" y="280" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12" letter-spacing="0.08em">PUNCH DATA</text>

  <g filter="url(#glow)">
    <path d="M560 320 L740 320" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="730,310 760,320 730,330" fill="#38bdf8"/>
  </g>

  <!-- Right: Oracle-style cloud panel -->
  <g transform="translate(780, 140)">
    <rect x="0" y="0" width="300" height="360" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="drop-shadow(0 12px 24px rgba(0,0,0,0.25))"/>
    <rect x="0" y="0" width="300" height="48" rx="20" fill="#e2e8f0"/>
    <rect x="0" y="32" width="300" height="16" fill="#e2e8f0"/>
    <circle cx="28" cy="26" r="8" fill="#c2410c"/>
    <text x="52" y="30" fill="#0f172a" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Oracle Fusion</text>
    <text x="52" y="48" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Time and Labor</text>
    <line x1="20" y1="64" x2="280" y2="64" stroke="#e2e8f0"/>
    <!-- mock time card rows -->
    <g font-family="system-ui,sans-serif" font-size="12" fill="#334155">
      <rect x="20" y="80" width="260" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
      <text x="32" y="102" font-weight="600">Time card</text>
      <text x="220" y="102" fill="#0d9488" font-size="11">Synced</text>
      <rect x="20" y="128" width="260" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
      <text x="32" y="150" font-weight="600">Time card</text>
      <text x="220" y="150" fill="#0d9488" font-size="11">Synced</text>
      <rect x="20" y="176" width="260" height="36" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
      <text x="32" y="198" font-weight="600">Import batch</text>
      <text x="200" y="198" fill="#047857" font-size="11">Complete</text>
    </g>
    <text x="150" y="300" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">HCM - Time &amp; Labor</text>
  </g>
</svg>
